      color: rgba(253,246,227,0.22);\n      letter-spacing: 0.1em;\n      animation: cfIn 0.25s ease 0.1s both;\n\n    /* -- Center cell pulse (5x5 corners/stamp) -- */\n    @keyframes centerCellPulse {\n      0%,100% { background: rgba(255,110,0,0.95); box-shadow: 0 0 6px rgba(255,90,0,0.85); }\n      50%     { background: rgba(255,170,20,0.40); box-shadow: 0 0 2px rgba(255,90,0,0.2); }\n    }\n    .pp-mini-cell.pp-lit.pp-center {\n      background: rgba(255,110,0,0.95) !important;\n      box-shadow: 0 0 6px rgba(255,90,0,0.85) !important;\n      animation: ppCellPop 0.25s cubic-bezier(0.34,1.2,0.64,1) both,\n                 centerCellPulse 0.28s ease-in-out 0.25s infinite !important;\n    }\n        }\n    </style>\n  \n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    :root {\n      /* Loter\u00eda Comedy brand */\n      --bg:        #0E3F4A;   /* Teal \u00b7 Deepest */\n      --surface:   #124F5C;   /* Teal \u00b7 Deep    */\n      --surface2:  #1A6B7A;   /* Teal \u00b7 Base    */\n      --surface3:  #1E7A8A;   /* Teal \u00b7 Mid     */\n      --border:    rgba(253,246,227,0.08);\n      --border2:   rgba(253,246,227,0.16);\n      --accent:    #E8700A;   /* Orange \u00b7 Accent */\n      --accent-hi: #F07D15;   /* Orange \u00b7 Hi     */\n      --pink:      #D4287A;   /* Pink \u00b7 Accent   */\n      --pink-hi:   #E03088;   /* Pink \u00b7 Hi       */\n      --text:      #FDF6E3;   /* Cream \u00b7 Primary */\n      --text-dim:  rgba(253,246,227,0.55);\n      --text-faint:rgba(253,246,227,0.32);\n    }\n\n    body {\n      background:\n        radial-gradient(circle at 85% -10%, rgba(232,112,10,0.18) 0%, transparent 55%),\n        radial-gradient(circle at -10% 100%, rgba(212,40,122,0.14) 0%, transparent 50%),\n        var(--bg);\n      background-attachment: fixed;\n      color: var(--text);\n      font-family: 'DM Mono', monospace;\n      min-height: 100dvh;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      padding: 36px 16px 80px;\n    }\n\n    /* \u2500\u2500\u2500 Header \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n    header {\n      width: 100%;\n      max-width: 480px;\n      margin-bottom: 24px;\n      display: flex;\n      align-items: flex-end;\n      justify-content: space-between;\n      gap: 14px;\n    }\n\n    .header-btns {\n      display: flex;\n      flex-direction: column;\n      align-items: flex-end;\n      gap: 6px;\n    }\n\n    .tool-name {\n      font-family: 'Bebas Neue', sans-serif;\n      font-size: 56px;\n      letter-spacing: 0.03em;\n      color: var(--text);\n      line-height: 0.9;\n    }\n    .tool-name span.bean { color: var(--accent); }\n\n    .tool-sub {\n      font-size: 10px;\n      color: var(--text-dim);\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      margin-top: 8px;\n    }\n\n    .brand-chip {\n      font-family: 'Bebas Neue', sans-serif;\n      font-size: 11px;\n      letter-spacing: 0.22em;\n      color: var(--pink-hi);\n      border: 1px solid rgba(212,40,122,0.4);\n      background: rgba(212,40,122,0.12);\n      padding: 5px 10px 4px;\n      border-radius: 100px;\n      white-space: nowrap;\n      margin-bottom: 4px;\n    }\n\n    /* \u2500\u2500\u2500 Board \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n    #board-wrap {\n      width: 100%;\n      max-width: 480px;\n      background: var(--surface);\n      border: 1px solid var(--border2);\n      padding: 5px;\n      position: relative;\n    }\n    /* corner accent ticks */\n    #board-wrap::before,\n    #board-wrap::after {\n      content: '';\n      position: absolute;\n      width: 14px; height: 14px;\n      border: 1.5px solid var(--accent);\n      pointer-events: none;\n    }\n    #board-wrap::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }\n    #board-wrap::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }\n\n    #board {\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 4px;\n    }\n\n    .cell {\n      position: relative;\n      overflow: hidden;\n      cursor: pointer;\n      aspect-ratio: 737 / 1131;\n      background: var(--surface2);\n      user-select: none;\n      -webkit-tap-highlight-color: transparent;\n    }\n    .cell::after {\n      /* subtle inner glow on hover */\n      content: '';\n      position: absolute; inset: 0;\n      box-shadow: inset 0 0 0 0 var(--accent);\n      transition: box-shadow 0.15s;\n      pointer-events: none;\n    }\n    .cell:hover::after { box-shadow: inset 0 0 0 2px var(--accent); }\n    .cell:active { filter: brightness(0.88); }\n\n    .cell img {\n      display: block;\n      width: 100%;\n      height: 100%;\n      object-fit: cover;\n      pointer-events: none;\n      user-select: none;\n      -webkit-user-drag: none;\n    }\n    .cell img.broken { display: none; }\n    .cell .placeholder {\n      position: absolute;\n      inset: 0;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 6px;\n      background:\n        repeating-linear-gradient(135deg,\n          rgba(253,246,227,0.03) 0 8px,\n          transparent 8px 16px),\n        var(--surface2);\n      color: var(--text-faint);\n      font-family: 'Bebas Neue', sans-serif;\n      letter-spacing: 0.12em;\n      pointer-events: none;\n    }\n    .placeholder .ph-num {\n      font-size: clamp(22px, 7vw, 36px);\n      color: var(--text-dim);\n      line-height: 1;\n    }\n    .placeholder .ph-label {\n      font-size: 8px;\n      letter-spacing: 0.28em;\n      color: var(--text-faint);\n    }\n\n    /* \u2500\u2500\u2500 Bean chip \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n    .chip {\n      position: absolute;\n      pointer-events: none;\n      top: 50%;\n      left: 50%;\n      line-height: 1;\n      display: block;\n      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));\n      animation: chip-drop 0.26s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.45));\n    }\n\n    @keyframes chip-drop {\n      from {\n        transform: translate(var(--tx), calc(var(--ty) - 14px)) rotate(var(--rot)) scale(0.4);\n        opacity: 0;\n      }\n      to {\n        transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1);\n        opacity: 1;\n      }\n    }\n\n    .chip.removing {\n      animation: chip-lift 0.15s ease-in forwards !important;\n    }\n\n    @keyframes chip-lift {\n      to {\n        transform: translate(var(--tx), calc(var(--ty) - 12px)) rotate(var(--rot)) scale(0.25);\n        opacity: 0;\n      }\n    }\n\n    /* \u2500\u2500\u2500 Controls \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n    #controls {\n      width: 100%;\n      max-width: 480px;\n      margin-top: 16px;\n      display: flex;\n      align-items: flex-start;\n      gap: 8px;\n    }\n\n    #chip-count { flex: 1; }\n\n    .count-num {\n      font-family: 'Bebas Neue', sans-serif;\n      font-size: 32px;\n      color: var(--accent);\n      line-height: 1;\n      letter-spacing: 0.05em;\n    }\n    .count-num .slash { color: var(--text-faint); margin: 0 2px; }\n    .count-num .total { color: var(--text-dim); }\n\n    .count-label {\n      display: block;\n      font-size: 9px;\n      color: var(--text-dim);\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      margin-top: 4px;\n    }\n\n    .btn {\n      font-family: 'Bebas Neue', sans-serif;\n      letter-spacing: 0.08em;\n      border: none;\n      cursor: pointer;\n      transition: background 0.14s, color 0.14s, transform 0.08s, border-color 0.14s;\n    }\n    .btn:active:not(:disabled) { transform: scale(0.97); }\n\n    .btn-primary {\n      background: var(--accent);\n      color: #0E3F4A;\n      font-size: 20px;\n      padding: 14px 22px;\n    }\n    .btn-primary:hover:not(:disabled) { background: var(--accent-hi); }\n\n    #new-btn:disabled {\n      background: transparent;\n      color: var(--accent);\n      border: 1px solid var(--border2);\n      cursor: default;\n      font-size: 20px;\n      padding: 14px 22px;\n    }\n\n    .btn-ghost {\n      background: transparent;\n      color: var(--text-dim);\n      border: 1px solid var(--border2);\n      font-size: 20px;\n      padding: 14px 22px;\n    }\n    .btn-ghost:hover {\n      color: var(--pink-hi);\n      border-color: rgba(212,40,122,0.5);\n      background: rgba(212,40,122,0.08);\n    }\n\n    /* New Board + pips */\n    #new-wrap {\n      display: flex;\n      flex-direction: column;\n      align-items: stretch;\n      gap: 6px;\n    }\n\n    #shuffle-pips {\n      display: flex;\n      justify-content: center;\n      gap: 5px;\n    }\n\n    .pip {\n      width: 11px;\n      height: 11px;\n      border-radius: 50%;\n      background: var(--accent);\n      transition: background 0.4s;\n    }\n    .pip.used { background: var(--border2); }\n\n    /* \u2500\u2500\u2500 Loading overlay \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n    #loading {\n      position: fixed;\n      inset: 0;\n      background: var(--bg);\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 14px;\n      z-index: 100;\n      transition: opacity 0.3s;\n    }\n    #loading.hidden { opacity: 0; pointer-events: none; }\n\n    .load-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.22em; text-transform: uppercase; }\n    .load-track { width: 110px; height: 2px; background: var(--border); }\n    .load-fill  { height: 100%; background: var(--accent); width: 0%; transition: width 0.18s; }\n\n    /* footer mark */\n    .footer-mark {\n      width: 100%;\n      max-width: 480px;\n      margin-top: 22px;\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      font-size: 9px;\n      letter-spacing: 0.24em;\n      text-transform: uppercase;\n      color: var(--text-faint);\n    }\n    .footer-mark::before, .footer-mark::after {\n      content: '';\n      flex: 1;\n      height: 1px;\n      background: var(--border);\n    }\n\n    /* ─── Chit picker ─────────────────────────────────────── */\n    #chit-overlay {\n      position: fixed; inset: 0;\n      background: rgba(7,28,33,0.88);\n      backdrop-filter: blur(8px);\n      -webkit-backdrop-filter: blur(8px);\n      display: flex; flex-direction: column;\n      align-items: center; justify-content: center;\n      z-index: 9500; gap: clamp(14px,2.5vw,24px);\n    }\n    #chit-overlay[hidden] { display: none; }\n    #chit-title {\n      font-family: 'Bebas Neue', sans-serif;\n      font-size: clamp(1.6rem, 4vw, 2.8rem);\n      letter-spacing: 0.14em; color: #FDF6E3;\n    }\n    #chit-cards {\n      display: flex; gap: clamp(10px,2vw,20px);\n      flex-wrap: wrap; justify-content: center;\n      max-width: min(620px, 92vw);\n    }\n    #chit-hint {\n      font-family: 'DM Mono', monospace; font-size: 0.62rem;\n      color: rgba(253,246,227,0.22); letter-spacing: 0.1em;\n    }\n    .chit-preview {\n      width: clamp(44px,8vw,68px); height: clamp(44px,8vw,68px);\n      display: flex; align-items: center; justify-content: center;\n      font-size: clamp(34px,6vw,54px); line-height: 1;\n      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.45));\n    }\n    .chit-preview img { width: 100%; height: 100%; object-fit: contain; }\n    .chip img.chit-img { display: block; object-fit: contain; pointer-events: none; -webkit-user-drag: none; }\n    .chip.no-shadow { filter: none; }\n  </style>\n</head>\n<body>\n\n  <div id=\"loading\">\n    <div class=\"load-label\">Loading cards\u2026</div>\n    <div class=\"load-track\"><div class=\"load-fill\" id=\"load-fill\"></div></div>\n  </div>\n\n  <header>\n    <div>\n      <div class=\"tool-name\">LA <span class=\"bean\">TABLITA</span></div>\n      <div class=\"tool-sub\">Loter\u00eda Comedy \u00b7 Play Board</div>\n    </div>\n    <div class=\"header-btns\">\n      <button id=\"pattern-btn\" class=\"brand-chip pp-trigger\" onclick=\"openPatternPicker()\">PATTERN</button>\n      <button id=\"chit-btn\" class=\"brand-chip pp-trigger\" onclick=\"openChitPicker()\">CHIT</button>\n      <button id=\"grid-toggle-btn\" class=\"brand-chip pp-trigger\" onclick=\"toggleGridSize()\">4\u00d74</button>\n    </div>\n  </header>\n\n  <div id=\"board-wrap\">\n    <div id=\"board\"></div>\n  </div>\n\n  <div id=\"controls\">\n    <div id=\"chip-count\">\n      <div class=\"count-num\"><span id=\"count-num\">0</span><span class=\"slash\"> / </span><span class=\"total\" id=\"count-total\">16</span></div>\n      <span class=\"count-label\">beans marked</span>\n    </div>\n    <button class=\"btn btn-ghost\" onclick=\"clearChips()\">Clear</button>\n    <div id=\"new-wrap\">\n      <button class=\"btn btn-primary\" id=\"new-btn\" onclick=\"newBoard()\">New Board</button>\n      <div id=\"shuffle-pips\">\n        <span class=\"pip\" id=\"pip-0\"></span>\n        <span class=\"pip\" id=\"pip-1\"></span>\n        <span class=\"pip\" id=\"pip-2\"></span>\n        <span class=\"pip\" id=\"pip-3\"></span>\n        <span class=\"pip\" id=\"pip-4\"></span>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"footer-mark\">Loter\u00eda Comedy \u00b7 MTC Tool Suite</div>\n\n  <script>\n    const TOTAL        = 54;\n    let gridSize = parseInt(localStorage.getItem('loteria_grid')) || 4;\n    const MAX_SHUFFLES = 5;\n    const COOLDOWN_MS  = 5 * 60 * 1000;\n\n    let boardIndices = [];\n    let markedCells  = new Set();\n\n    /* \u2500\u2500 Shuffle state (localStorage-backed) \u2500\u2500 */\n    const _sl = localStorage.getItem('loteria_shuffles');\n    let shufflesLeft  = clamp(_sl !== null ? parseInt(_sl) : MAX_SHUFFLES, 0, MAX_SHUFFLES);\n    let resetAt       = parseInt(localStorage.getItem('loteria_reset')) || 0;\n    let tickTimer     = null;\n\n    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }\n\n    function saveShuffles() {\n      localStorage.setItem('loteria_shuffles', shufflesLeft);\n      localStorage.setItem('loteria_reset',    resetAt);\n    }\n\n    function recheckReset() {\n      if (shufflesLeft === 0 && resetAt && Date.now() >= resetAt) {\n        shufflesLeft = MAX_SHUFFLES;\n        resetAt = 0;\n        saveShuffles();\n      }\n    }\n\n    function renderShuffleUI() {\n      recheckReset();\n      const btn = document.getElementById('new-btn');\n\n      for (let i = 0; i < MAX_SHUFFLES; i++) {\n        document.getElementById(`pip-${i}`).classList.toggle('used', i >= shufflesLeft);\n      }\n\n      if (shufflesLeft === 0) {\n        btn.disabled = true;\n        startTick();\n      } else {\n        btn.disabled = false;\n        btn.textContent = 'New Board';\n        stopTick();\n      }\n    }\n\n    function startTick() {\n      stopTick();\n      tickFn();\n      tickTimer = setInterval(tickFn, 1000);\n    }\n\n    function stopTick() {\n      if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }\n    }\n\n    function tickFn() {\n      if (Date.now() >= resetAt) {\n        recheckReset();\n        renderShuffleUI();\n      } else {\n        const ms   = Math.max(0, resetAt - Date.now());\n        const mins = Math.floor(ms / 60000);\n        const secs = Math.floor((ms % 60000) / 1000);\n        document.getElementById('new-btn').textContent = `${mins}:${String(secs).padStart(2, '0')}`;\n      }\n    }\n\n    /* \u2500\u2500 Board \u2500\u2500 */\n    function shuffle(arr) {\n      for (let i = arr.length - 1; i > 0; i--) {\n        const j = Math.floor(Math.random() * (i + 1));\n        [arr[i], arr[j]] = [arr[j], arr[i]];\n      }\n    }\n\n    function pickBoard() {\n      const pool = Array.from({ length: TOTAL }, (_, i) => i + 1);\n      shuffle(pool);\n      return pool.slice(0, gridSize * gridSize);\n    }\n\n    function renderBoard() {\n      const el = document.getElementById('board');\n      el.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;\n      el.innerHTML = '';\n      boardChitColor = randomBoldColor();\n      markedCells.clear();\n      updateCount();\n\n      boardIndices.forEach((imgNum, cellIdx) => {\n        const cell = document.createElement('div');\n        cell.className = 'cell';\n\n        const img = document.createElement('img');\n        img.src = `png/img${imgNum}.png`;\n        img.alt = '';\n        img.addEventListener('error', () => {\n          img.classList.add('broken');\n          const ph = document.createElement('div');\n          ph.className = 'placeholder';\n          ph.innerHTML = `<div class=\"ph-num\">${String(imgNum).padStart(2,'0')}</div><div class=\"ph-label\">Carta</div>`;\n          cell.insertBefore(ph, img);\n        }, { once: true });\n        cell.appendChild(img);\n\n        cell.addEventListener('click', () => toggleMark(cell, cellIdx));\n        el.appendChild(cell);\n      });\n    }\n\n    /* \u2500\u2500 Marking \u2500\u2500 */\n    function toggleMark(cell, idx) {\n      markedCells.has(idx) ? removeChip(cell, idx) : addChip(cell, idx);\n      updateCount();\n    }\n\n    function addChip(cell, idx) {\n      markedCells.add(idx);\n\n      const rect = cell.getBoundingClientRect();\n      const SCALES = { Scribble: 1.6, PokerChip: 1.72, Thumbprint: 1.5 };\n      const scale  = SCALES[currentChit] || 1;\n      const spread = 0.40 / scale;                           // keep larger chits centered\n      const dx   = (Math.random() * spread - spread / 2) * rect.width;\n      const dy   = (Math.random() * spread - spread / 2) * rect.height;\n      const rotRange = currentChit === 'PokerChip' ? 180 : 38; // poker spins harder\n      const rot  = (Math.random() * 2 * rotRange - rotRange).toFixed(1);\n      const size = Math.round(rect.width * 0.54 * scale);\n\n      const chip = document.createElement('span');\n      chip.className   = 'chip';\n      chip.dataset.size = size;\n      renderChipContent(chip, size);\n      chip.style.setProperty('--tx', `calc(-50% + ${dx.toFixed(1)}px)`);\n      chip.style.setProperty('--ty', `calc(-50% + ${dy.toFixed(1)}px)`);\n      chip.style.setProperty('--rot', `${rot}deg`);\n      cell.appendChild(chip);\n    }\n\n    function removeChip(cell, idx) {\n      markedCells.delete(idx);\n      const chip = cell.querySelector('.chip');\n      if (!chip || chip.classList.contains('removing')) return;\n      chip.classList.add('removing');\n      chip.addEventListener('animationend', () => chip.remove(), { once: true });\n    }\n\n    function updateCount() {\n      document.getElementById('count-num').textContent = markedCells.size;\n      checkPattern();\n    }\n\n    /* \u2500\u2500 Controls \u2500\u2500 */\n    function clearChips() {\n      document.querySelectorAll('.chip:not(.removing)').forEach(chip => {\n        chip.classList.add('removing');\n        chip.addEventListener('animationend', () => chip.remove(), { once: true });\n      });\n      markedCells.clear();\n      updateCount();\n    }\n\n    \n    function showConfirm() {\n      return new Promise(resolve => {\n        const modal = document.getElementById('confirm-modal');\n        modal.hidden = false;\n        function done(result) {\n          modal.hidden = true;\n          modal.querySelector('.confirm-ok').onclick = null;\n          modal.querySelector('.confirm-cancel').onclick = null;\n          resolve(result);\n        }\n        modal.querySelector('.confirm-ok').onclick     = () => done(true);\n        modal.querySelector('.confirm-cancel').onclick = () => done(false);\n      });\n    }\n\n    async function newBoard() {\n      recheckReset();\n      if (shufflesLeft <= 0) return;\n      if (markedCells.size > 0 && !await showConfirm()) return;\n\n      shufflesLeft--;\n      if (shufflesLeft === 0) resetAt = Date.now() + COOLDOWN_MS;\n      saveShuffles();\n      renderShuffleUI();\n\n      boardIndices = pickBoard();\n      renderBoard(); applyPatternGuide(); checkPattern();\n    }\n\n    /* \u2500\u2500 Init \u2500\u2500 */\n    \n    /* ---- Pattern Tracker ---- */\n    const PATTERNS_4 = [\n      { id:'horizontal', label:'HORIZONTAL',\n        variants:[[[0,0],[1,0],[2,0],[3,0]],[[0,1],[1,1],[2,1],[3,1]],\n                  [[0,2],[1,2],[2,2],[3,2]],[[0,3],[1,3],[2,3],[3,3]]] },\n      { id:'vertical',   label:'VERTICAL',\n        variants:[[[0,0],[0,1],[0,2],[0,3]],[[1,0],[1,1],[1,2],[1,3]],\n                  [[2,0],[2,1],[2,2],[2,3]],[[3,0],[3,1],[3,2],[3,3]]] },\n      { id:'corners',    label:'4 CORNERS',\n        variants:[[[0,0],[3,0],[0,3],[3,3]]] },\n      { id:'stamp',      label:'STAMP',\n        variants:[[[0,0],[1,0],[0,1],[1,1]],[[2,0],[3,0],[2,1],[3,1]],\n                  [[0,2],[1,2],[0,3],[1,3]],[[2,2],[3,2],[2,3],[3,3]]] },\n      { id:'diagonal',   label:'DIAGONAL',\n        variants:[[[0,0],[1,1],[2,2],[3,3]],[[3,0],[2,1],[1,2],[0,3]]] },\n      { id:'anyline',    label:'ANY LINE',\n        variants:[[[0,0],[1,0],[2,0],[3,0]],[[0,1],[1,1],[2,1],[3,1]],\n                  [[0,2],[1,2],[2,2],[3,2]],[[0,3],[1,3],[2,3],[3,3]],\n                  [[0,0],[0,1],[0,2],[0,3]],[[1,0],[1,1],[1,2],[1,3]],\n                  [[2,0],[2,1],[2,2],[2,3]],[[3,0],[3,1],[3,2],[3,3]],\n                  [[0,0],[1,1],[2,2],[3,3]],[[3,0],[2,1],[1,2],[0,3]]] },\n      { id:'any',        label:'ANY',\n        variants:[[[0,0],[1,0],[2,0],[3,0]],[[0,1],[1,1],[2,1],[3,1]],\n                  [[0,2],[1,2],[2,2],[3,2]],[[0,3],[1,3],[2,3],[3,3]],\n                  [[0,0],[0,1],[0,2],[0,3]],[[1,0],[1,1],[1,2],[1,3]],\n                  [[2,0],[2,1],[2,2],[2,3]],[[3,0],[3,1],[3,2],[3,3]],\n                  [[0,0],[1,1],[2,2],[3,3]],[[3,0],[2,1],[1,2],[0,3]],\n                  [[0,0],[3,0],[0,3],[3,3]],\n                  [[0,0],[1,0],[0,1],[1,1]],[[2,0],[3,0],[2,1],[3,1]],\n                  [[0,2],[1,2],[0,3],[1,3]],[[2,2],[3,2],[2,3],[3,3]]] }\n    ];\n\n    const PATTERNS_5 = [\n      { id:'horizontal', label:'HORIZONTAL',\n        variants:[[[0,0],[1,0],[2,0],[3,0],[4,0]],[[0,1],[1,1],[2,1],[3,1],[4,1]],\n                  [[0,2],[1,2],[2,2],[3,2],[4,2]],[[0,3],[1,3],[2,3],[3,3],[4,3]],\n                  [[0,4],[1,4],[2,4],[3,4],[4,4]]] },\n      { id:'vertical',   label:'VERTICAL',\n        variants:[[[0,0],[0,1],[0,2],[0,3],[0,4]],[[1,0],[1,1],[1,2],[1,3],[1,4]],\n                  [[2,0],[2,1],[2,2],[2,3],[2,4]],[[3,0],[3,1],[3,2],[3,3],[3,4]],\n                  [[4,0],[4,1],[4,2],[4,3],[4,4]]] },\n      { id:'corners',    label:'4 CORNERS + CENTER',\n        centerCell:[2,2],\n        variants:[[[0,0],[4,0],[0,4],[4,4],[2,2]]] },\n      { id:'stamp',      label:'STAMP + CENTER',\n        centerCell:[2,2],\n        variants:[[[0,0],[1,0],[0,1],[1,1],[2,2]],[[3,0],[4,0],[3,1],[4,1],[2,2]],\n                  [[0,3],[1,3],[0,4],[1,4],[2,2]],[[3,3],[4,3],[3,4],[4,4],[2,2]]] },\n      { id:'diagonal',   label:'DIAGONAL',\n        variants:[[[0,0],[1,1],[2,2],[3,3],[4,4]],[[4,0],[3,1],[2,2],[1,3],[0,4]]] },\n      { id:'anyline',    label:'ANY LINE',\n        variants:[[[0,0],[1,0],[2,0],[3,0],[4,0]],[[0,2],[1,2],[2,2],[3,2],[4,2]],\n                  [[0,0],[0,1],[0,2],[0,3],[0,4]],[[4,0],[4,1],[4,2],[4,3],[4,4]],\n                  [[0,0],[1,1],[2,2],[3,3],[4,4]],[[4,0],[3,1],[2,2],[1,3],[0,4]]] },\n      { id:'any',        label:'ANY',\n        variants:[[[0,0],[1,0],[2,0],[3,0],[4,0]],[[0,2],[1,2],[2,2],[3,2],[4,2]],\n                  [[0,0],[0,1],[0,2],[0,3],[0,4]],[[4,0],[4,1],[4,2],[4,3],[4,4]],\n                  [[0,0],[1,1],[2,2],[3,3],[4,4]],[[4,0],[3,1],[2,2],[1,3],[0,4]],\n                  [[0,0],[4,0],[0,4],[4,4],[2,2]],[[0,0],[1,0],[0,1],[1,1],[2,2]]] }\n    ];\n\n    function getPatterns() { return gridSize === 5 ? PATTERNS_5 : PATTERNS_4; }\n\n    let currentPattern = null;\n    let ppTimers = [];\n\n    function toggleGridSize() {\n      gridSize = gridSize === 4 ? 5 : 4;\n      localStorage.setItem('loteria_grid', gridSize);\n      currentPattern = null;\n      document.getElementById('pattern-btn').textContent = 'PATTERN';\n      document.getElementById('pattern-btn').classList.remove('pp-active');\n      document.getElementById('count-total').textContent = gridSize * gridSize;\n      const tb = document.getElementById('grid-toggle-btn');\n      tb.textContent = gridSize + '\u00d7' + gridSize;\n      tb.classList.toggle('pp-active', gridSize === 5);\n      boardIndices = pickBoard();\n      renderBoard();\n      applyPatternGuide();\n      checkPattern();\n    }\n\n    function openPatternPicker() {\n      const ov = document.getElementById('pattern-overlay');\n      ov.hidden = false;\n      buildPickerCards();\n      ov.addEventListener('click', e => { if (e.target === ov) closePatternPicker(); }, { once: true });\n    }\n\n    function closePatternPicker() {\n      document.getElementById('pattern-overlay').hidden = true;\n      ppTimers.forEach(clearTimeout); ppTimers = [];\n    }\n\n    function buildPickerCards() {\n      const container = document.getElementById('pp-cards');\n      container.innerHTML = '';\n      getPatterns().forEach(p => {\n        const card = document.createElement('div');\n        card.className = 'pp-card' + (currentPattern?.id === p.id ? ' pp-selected' : '');\n\n        const board = document.createElement('div');\n        board.className = 'pp-mini-board';\n        board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;\n        for (let i = 0; i < gridSize * gridSize; i++) {\n          const c = document.createElement('div'); c.className = 'pp-mini-cell'; board.appendChild(c);\n        }\n\n        const lbl = document.createElement('div');\n        lbl.className = 'pp-card-label'; lbl.textContent = p.label;\n\n        card.appendChild(board); card.appendChild(lbl);\n        card.onclick = () => selectPattern(p);\n        container.appendChild(card);\n        animateMiniBoard(board, p);\n      });\n    }\n\n    function animateMiniBoard(board, p) {\n      let varIdx = 0;\n      const STEP = gridSize === 5 ? 90 : 130;\n      const HOLD = gridSize === 5 ? 700 : 820;\n      const [ccol, crow] = p.centerCell ?? [-1, -1];\n      function run() {\n        board.querySelectorAll('.pp-mini-cell').forEach(c => c.classList.remove('pp-lit', 'pp-center'));\n        const variant = p.variants[varIdx];\n        let i = 0;\n        function step() {\n          if (i < variant.length) {\n            const [col, row] = variant[i];\n            const cell = board.querySelectorAll('.pp-mini-cell')[row*gridSize+col];\n            cell.classList.add('pp-lit');\n            if (col === ccol && row === crow) cell.classList.add('pp-center');\n            i++; ppTimers.push(setTimeout(step, STEP));\n          } else {\n            ppTimers.push(setTimeout(() => { varIdx = (varIdx+1) % p.variants.length; run(); }, HOLD));\n          }\n        }\n        ppTimers.push(setTimeout(step, 80));\n      }\n      run();\n    }\n\n    function selectPattern(p) {\n      const btn = document.getElementById('pattern-btn');\n      if (currentPattern?.id === p.id) {\n        currentPattern = null;\n        btn.textContent = 'PATTERN'; btn.classList.remove('pp-active');\n      } else {\n        currentPattern = p;\n        btn.textContent = p.label; btn.classList.add('pp-active');\n      }\n      closePatternPicker();\n      applyPatternGuide();\n      checkPattern();\n    }\n\n    function applyPatternGuide() {\n      document.querySelectorAll('.cell').forEach(c => c.classList.remove('pat-guide','pat-win'));\n      if (!currentPattern) return;\n      const cells = document.querySelectorAll('.cell');\n      const guided = new Set();\n      currentPattern.variants.forEach(v => v.forEach(([col,row]) => guided.add(row*gridSize+col)));\n      guided.forEach(idx => cells[idx]?.classList.add('pat-guide'));\n    }\n\n    function checkPattern() {\n      if (!currentPattern) return;\n      const cells = document.querySelectorAll('.cell');\n      document.querySelectorAll('.cell.pat-win').forEach(c => {\n        c.classList.remove('pat-win'); c.classList.add('pat-guide');\n      });\n      for (const variant of currentPattern.variants) {\n        if (variant.every(([col,row]) => markedCells.has(row*gridSize+col))) {\n          variant.forEach(([col,row]) => {\n            const c = cells[row*gridSize+col];\n            c.classList.remove('pat-guide'); c.classList.add('pat-win');\n          });\n          return;\n        }\n      }\n    }\n    /* ---- end Pattern Tracker ---- */\n\n    /* ---- Chit Picker ---- */\n    const CHITS = [\n      { id:'bean',       label:'BEAN' },\n      { id:'PokerChip',  label:'POKER CHIP' },\n      { id:'ClearChip',  label:'CLEAR CHIP' },\n      { id:'Daub',       label:'DAUB' },\n      { id:'Scribble',   label:'SCRIBBLE' },\n      { id:'Thumbprint', label:'THUMBPRINT' }\n    ];\n    let currentChit = localStorage.getItem('loteria_chit') || 'bean';\n    if (!CHITS.some(c => c.id === currentChit)) currentChit = 'bean';\n\n    /* SVG sources cached as raw text so near-black fills can be recolored */\n    const chitSvgText = {};\n    const BLACK_CHITS = ['Thumbprint'];               // always stays black\n    /* Bold, saturated colors that read well against the white chip art */\n    const BOLD_COLORS = ['#c81e1e','#1565c0','#2e7d32','#6a1b9a','#ad1457','#e65100','#00695c','#283593','#d81b60','#00838f'];\n    function randomBoldColor() { return BOLD_COLORS[Math.floor(Math.random() * BOLD_COLORS.length)]; }\n    let boardChitColor = randomBoldColor();           // shared bold color for the current board\n\n    function preloadChits() {\n      CHITS.filter(c => c.id !== 'bean').forEach(c => {\n        fetch(`chits/${c.id}.svg`)\n          .then(r => r.ok ? r.text() : Promise.reject())\n          .then(t => { chitSvgText[c.id] = t; })\n          .catch(() => {});\n      });\n    }\n\n    function randomChitColor() {\n      return `hsl(${Math.floor(Math.random() * 360)}, 78%, 56%)`;\n    }\n\n    function nearBlack(hex) {\n      const h = hex.slice(1);\n      const r = parseInt(h.slice(0, 2), 16);\n      const g = parseInt(h.slice(2, 4), 16);\n      const b = parseInt(h.slice(4, 6), 16);\n      return Math.max(r, g, b) < 64;\n    }\n\n    /* Recolor the black artwork two ways, leaving reds/whites intact:\n       1) swap explicit near-black hex fills (e.g. PokerChip);\n       2) set fill on the root <svg> so paths with no fill (which default to\n          black: ClearChip, Daub) inherit the color too. */\n    function recolorSvg(text, color, keep) {\n      if (!color) return text;\n      const keepSet = new Set((keep || []).map(h => h.toLowerCase()));\n      text = text.replace(/#[0-9a-fA-F]{6}\\b/g,\n        m => (!keepSet.has(m.toLowerCase()) && nearBlack(m)) ? color : m);\n      text = text.replace(/<svg\\b([^>]*)>/i, (m, attrs) =>\n        /\\bfill\\s*=/.test(attrs) ? m : `<svg${attrs} fill=\"${color}\">`);\n      return text;\n    }\n\n    /* The color a given chit should use right now */\n    function chitColorFor(id) {\n      if (id === 'bean' || BLACK_CHITS.includes(id)) return null; // unchanged / black\n      if (id === 'ClearChip') return randomChitColor();           // new color every dab\n      return boardChitColor;                                      // Daub, PokerChip: per board\n    }\n\n    function chitImgSrc(id, color) {\n      const raw = chitSvgText[id];\n      if (!raw) return `chits/${id}.svg`;            // fallback until preload finishes\n      const keep = id === 'PokerChip' ? ['#0c0e0f', '#0e0f10'] : null; // keep black suites\n      const colored = recolorSvg(raw.slice(raw.indexOf('<svg')), color, keep);\n      return 'data:image/svg+xml,' + encodeURIComponent(colored);\n    }\n\n    function renderChipContent(chip, size) {\n      chip.innerHTML = '';\n      chip.classList.toggle('no-shadow', currentChit === 'Daub' || currentChit === 'Scribble');\n      if (currentChit === 'bean') {\n        chip.style.fontSize = `${size}px`;\n        chip.textContent = '🫘';\n        return;\n      }\n      chip.style.fontSize = '';\n      const im = document.createElement('img');\n      im.className = 'chit-img';\n      im.src = chitImgSrc(currentChit, chitColorFor(currentChit));\n      im.alt = '';\n      im.draggable = false;\n      im.style.width = `${size}px`;\n      im.style.height = `${size}px`;\n      chip.appendChild(im);\n    }\n\n    function refreshChips() {\n      document.querySelectorAll('.chip:not(.removing)').forEach(chip => {\n        renderChipContent(chip, parseFloat(chip.dataset.size) || 0);\n      });\n    }\n\n    function openChitPicker() {\n      const ov = document.getElementById('chit-overlay');\n      ov.hidden = false;\n      buildChitCards();\n      ov.addEventListener('click', e => { if (e.target === ov) ov.hidden = true; }, { once: true });\n    }\n\n    function buildChitCards() {\n      const container = document.getElementById('chit-cards');\n      container.innerHTML = '';\n      CHITS.forEach(ch => {\n        const card = document.createElement('div');\n        card.className = 'pp-card' + (currentChit === ch.id ? ' pp-selected' : '');\n\n        const prev = document.createElement('div');\n        prev.className = 'chit-preview';\n        if (ch.id === 'bean') {\n          prev.textContent = '🫘';\n        } else {\n          const im = document.createElement('img');\n          im.src = chitImgSrc(ch.id, chitColorFor(ch.id)); im.alt = ''; im.draggable = false;\n          prev.appendChild(im);\n        }\n\n        const lbl = document.createElement('div');\n        lbl.className = 'pp-card-label'; lbl.textContent = ch.label;\n\n        card.appendChild(prev); card.appendChild(lbl);\n        card.onclick = () => selectChit(ch);\n        container.appendChild(card);\n      });\n    }\n\n    function selectChit(ch) {\n      currentChit = ch.id;\n      localStorage.setItem('loteria_chit', ch.id);\n      document.getElementById('chit-btn').classList.toggle('pp-active', ch.id !== 'bean');\n      document.getElementById('chit-overlay').hidden = true;\n      refreshChips();\n    }\n    /* ---- end Chit Picker ---- */\n\n    (function init() {\n      preloadChits();\n      boardIndices = pickBoard();\n      renderBoard();\n      renderShuffleUI();\n      document.getElementById('count-total').textContent = gridSize * gridSize;\n      const tb = document.getElementById('grid-toggle-btn');\n      tb.textContent = gridSize + '\u00d7' + gridSize;\n      tb.classList.toggle('pp-active', gridSize === 5);\n      document.getElementById('chit-btn').classList.toggle('pp-active', currentChit !== 'bean');\n\n      const imgs    = document.querySelectorAll('.cell img');\n      const fill    = document.getElementById('load-fill');\n      const loading = document.getElementById('loading');\n      let loaded = 0;\n\n      function onSettle() {\n        loaded++;\n        fill.style.width = (loaded / imgs.length * 100) + '%';\n        if (loaded === imgs.length) {\n          loading.classList.add('hidden');\n          setTimeout(() => loading.remove(), 350);\n        }\n      }\n\n      if (imgs.length === 0) { loading.classList.add('hidden'); return; }\n      imgs.forEach(img => {\n        if (img.complete) onSettle();\n        else {\n          img.addEventListener('load',  onSettle, { once: true });\n          img.addEventListener('error', onSettle, { once: true });\n        }\n      });\n    })();\n  <\/script>\n\n\n\n  <div id=\"confirm-modal\" class=\"confirm-overlay\" hidden>\n    <div class=\"confirm-card\">\n      <div class=\"confirm-title\">New Board?</div>\n      <div class=\"confirm-sub\">Your chips will be cleared.</div>\n      <div class=\"confirm-btns\">\n        <button class=\"confirm-cancel\">Keep Playing</button>\n        <button class=\"confirm-ok\">New Board</button>\n      </div>\n    </div>\n  </div>\n\n  <div id=\"pattern-overlay\" hidden>\n    <div id=\"pp-title\">SELECT A PATTERN</div>\n    <div id=\"pp-cards\"></div>\n    <div id=\"pp-hint\">PICK ONE TO TRACK  \u00b7  PICK AGAIN TO CLEAR</div>\n  </div>\n\n  <div id=\"chit-overlay\" hidden>\n    <div id=\"chit-title\">PICK YOUR CHIT</div>\n    <div id=\"chit-cards\"></div>\n    <div id=\"chit-hint\">TAP A CHIT TO USE IT FOR MARKING</div>\n  </div>\n</body></html>"
  </script>
