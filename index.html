<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotería — Play Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #141414;
      --surface2: #1c1c1c;
      --border:   #252525;
      --border2:  #2e2e2e;
      --accent:   #e8c547;
      --text:     #d8d8d8;
      --text-dim: #505050;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 80px;
    }

    /* ─── Header ─────────────────────────────────────── */
    header { width: 100%; max-width: 480px; margin-bottom: 24px; }

    .tool-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1;
    }
    .tool-name span { color: var(--accent); }

    .tool-sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ─── Board ──────────────────────────────────────── */
    #board-wrap {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
    }

    .cell {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 737 / 1131;
      background: var(--surface2);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .cell:active { filter: brightness(0.85); }

    .cell img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ─── Bean chip ──────────────────────────────────── */
    .chip {
      position: absolute;
      pointer-events: none;
      top: 50%;
      left: 50%;
      line-height: 1;
      display: block;
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
      animation: chip-drop 0.26s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes chip-drop {
      from {
        transform: translate(var(--tx), calc(var(--ty) - 14px)) rotate(var(--rot)) scale(0.4);
        opacity: 0;
      }
      to {
        transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1);
        opacity: 1;
      }
    }

    .chip.removing {
      animation: chip-lift 0.15s ease-in forwards !important;
    }

    @keyframes chip-lift {
      to {
        transform: translate(var(--tx), calc(var(--ty) - 12px)) rotate(var(--rot)) scale(0.25);
        opacity: 0;
      }
    }

    /* ─── Controls ───────────────────────────────────── */
    #controls {
      width: 100%;
      max-width: 480px;
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chip-count { flex: 1; }

    .count-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      color: var(--accent);
      line-height: 1;
      letter-spacing: 0.05em;
    }

    .count-label {
      display: block;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .btn {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.08em;
      border: none;
      cursor: pointer;
      transition: background 0.14s, color 0.14s, transform 0.08s;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #000;
      font-size: 20px;
      padding: 14px 22px;
    }
    .btn-primary:hover:not(:disabled) { background: #f0d060; }

    #new-btn:disabled {
      background: var(--surface);
      color: var(--accent);
      border: 1px solid var(--border2);
      cursor: default;
      font-size: 20px;
      padding: 14px 22px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border2);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 14px 16px;
    }
    .btn-ghost:hover { color: var(--text); background: var(--surface); }

    /* New Board + pips */
    #new-wrap {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
    }

    #shuffle-pips {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      transition: background 0.4s;
    }
    .pip.used { background: var(--border2); }

    /* ─── Loading overlay ────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 100;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .load-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.22em; text-transform: uppercase; }
    .load-track { width: 110px; height: 2px; background: var(--border); }
    .load-fill  { height: 100%; background: var(--accent); width: 0%; transition: width 0.18s; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="load-label">Loading cards…</div>
    <div class="load-track"><div class="load-fill" id="load-fill"></div></div>
  </div>

  <header>
    <div class="tool-name">LOT<span>ERÍA</span></div>
    <div class="tool-sub">MTC Tool Suite — Play Board</div>
  </header>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="controls">
    <div id="chip-count">
      <div class="count-num"><span id="count-num">0</span> / 16</div>
      <span class="count-label">marked</span>
    </div>
    <button class="btn btn-ghost" onclick="clearChips()">Clear</button>
    <div id="new-wrap">
      <button class="btn btn-primary" id="new-btn" onclick="newBoard()">New Board</button>
      <div id="shuffle-pips">
        <span class="pip" id="pip-0"></span>
        <span class="pip" id="pip-1"></span>
        <span class="pip" id="pip-2"></span>
        <span class="pip" id="pip-3"></span>
        <span class="pip" id="pip-4"></span>
      </div>
    </div>
  </div>

  <script>
    const TOTAL        = 54;
    const GRID         = 4;
    const MAX_SHUFFLES = 5;
    const COOLDOWN_MS  = 5 * 60 * 1000;

    let boardIndices = [];
    let markedCells  = new Set();

    /* ── Shuffle state (localStorage-backed) ── */
    let shufflesLeft  = clamp(parseInt(localStorage.getItem('loteria_shuffles')) || MAX_SHUFFLES, 0, MAX_SHUFFLES);
    let resetAt       = parseInt(localStorage.getItem('loteria_reset')) || 0;
    let tickTimer     = null;

    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

    function saveShuffles() {
      localStorage.setItem('loteria_shuffles', shufflesLeft);
      localStorage.setItem('loteria_reset',    resetAt);
    }

    function recheckReset() {
      if (shufflesLeft === 0 && resetAt && Date.now() >= resetAt) {
        shufflesLeft = MAX_SHUFFLES;
        resetAt = 0;
        saveShuffles();
      }
    }

    function renderShuffleUI() {
      recheckReset();
      const btn = document.getElementById('new-btn');

      for (let i = 0; i < MAX_SHUFFLES; i++) {
        document.getElementById(`pip-${i}`).classList.toggle('used', i >= shufflesLeft);
      }

      if (shufflesLeft === 0) {
        btn.disabled = true;
        startTick();
      } else {
        btn.disabled = false;
        btn.textContent = 'New Board';
        stopTick();
      }
    }

    function startTick() {
      stopTick();
      tickFn();
      tickTimer = setInterval(tickFn, 1000);
    }

    function stopTick() {
      if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
    }

    function tickFn() {
      if (Date.now() >= resetAt) {
        recheckReset();
        renderShuffleUI();
      } else {
        const ms   = Math.max(0, resetAt - Date.now());
        const mins = Math.floor(ms / 60000);
        const secs = Math.floor((ms % 60000) / 1000);
        document.getElementById('new-btn').textContent = `${mins}:${String(secs).padStart(2, '0')}`;
      }
    }

    /* ── Board ── */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function pickBoard() {
      const pool = Array.from({ length: TOTAL }, (_, i) => i + 1);
      shuffle(pool);
      return pool.slice(0, GRID * GRID);
    }

    function renderBoard() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      markedCells.clear();
      updateCount();

      boardIndices.forEach((imgNum, cellIdx) => {
        const cell = document.createElement('div');
        cell.className = 'cell';

        const img = document.createElement('img');
        img.src = `png/img${imgNum}.png`;
        img.alt = '';
        cell.appendChild(img);

        cell.addEventListener('click', () => toggleMark(cell, cellIdx));
        el.appendChild(cell);
      });
    }

    /* ── Marking ── */
    function toggleMark(cell, idx) {
      markedCells.has(idx) ? removeChip(cell, idx) : addChip(cell, idx);
      updateCount();
    }

    function addChip(cell, idx) {
      markedCells.add(idx);

      const rect = cell.getBoundingClientRect();
      const dx   = (Math.random() * 0.28 - 0.14) * rect.width;
      const dy   = (Math.random() * 0.28 - 0.14) * rect.height;
      const rot  = (Math.random() * 28 - 14).toFixed(1);
      const size = Math.round(rect.width * 0.54);

      const chip = document.createElement('span');
      chip.className   = 'chip';
      chip.textContent = '🫘';
      chip.style.fontSize = `${size}px`;
      chip.style.setProperty('--tx', `calc(-50% + ${dx.toFixed(1)}px)`);
      chip.style.setProperty('--ty', `calc(-50% + ${dy.toFixed(1)}px)`);
      chip.style.setProperty('--rot', `${rot}deg`);
      cell.appendChild(chip);
    }

    function removeChip(cell, idx) {
      markedCells.delete(idx);
      const chip = cell.querySelector('.chip');
      if (!chip || chip.classList.contains('removing')) return;
      chip.classList.add('removing');
      chip.addEventListener('animationend', () => chip.remove(), { once: true });
    }

    function updateCount() {
      document.getElementById('count-num').textContent = markedCells.size;
    }

    /* ── Controls ── */
    function clearChips() {
      document.querySelectorAll('.chip:not(.removing)').forEach(chip => {
        chip.classList.add('removing');
        chip.addEventListener('animationend', () => chip.remove(), { once: true });
      });
      markedCells.clear();
      updateCount();
    }

    function newBoard() {
      recheckReset();
      if (shufflesLeft <= 0) return;
      if (markedCells.size > 0 && !confirm('Start a new board? Your chips will be cleared.')) return;

      shufflesLeft--;
      if (shufflesLeft === 0) resetAt = Date.now() + COOLDOWN_MS;
      saveShuffles();
      renderShuffleUI();

      boardIndices = pickBoard();
      renderBoard();
    }

    /* ── Init ── */
    (function init() {
      boardIndices = pickBoard();
      renderBoard();
      renderShuffleUI();

      const imgs    = document.querySelectorAll('.cell img');
      const fill    = document.getElementById('load-fill');
      const loading = document.getElementById('loading');
      let loaded = 0;

      function onSettle() {
        loaded++;
        fill.style.width = (loaded / imgs.length * 100) + '%';
        if (loaded === imgs.length) {
          loading.classList.add('hidden');
          setTimeout(() => loading.remove(), 350);
        }
      }

      imgs.forEach(img => {
        if (img.complete) onSettle();
        else {
          img.addEventListener('load',  onSettle, { once: true });
          img.addEventListener('error', onSettle, { once: true });
        }
      });
    })();
  </script>
</body>
</html>
