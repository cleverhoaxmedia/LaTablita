document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"976a6d7a-2afd-4a12-b65d-0822be2bbb81\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e07959e0-1ddf-445a-bd1a-d9140e3143be\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"13e9f651-bf28-4585-a6ef-4a7ce99da750\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"80c15196-a057-4389-a9a0-71e8d53dab9c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"eb474d4b-7fc1-4344-b3d4-5df7da77f381\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  \n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    :root {\n      /* Lotería Comedy brand */\n      --bg:        #0E3F4A;   /* Teal · Deepest */\n      --surface:   #124F5C;   /* Teal · Deep    */\n      --surface2:  #1A6B7A;   /* Teal · Base    */\n      --surface3:  #1E7A8A;   /* Teal · Mid     */\n      --border:    rgba(253,246,227,0.08);\n      --border2:   rgba(253,246,227,0.16);\n      --accent:    #E8700A;   /* Orange · Accent */\n      --accent-hi: #F07D15;   /* Orange · Hi     */\n      --pink:      #D4287A;   /* Pink · Accent   */\n      --pink-hi:   #E03088;   /* Pink · Hi       */\n      --text:      #FDF6E3;   /* Cream · Primary */\n      --text-dim:  rgba(253,246,227,0.55);\n      --text-faint:rgba(253,246,227,0.32);\n    }\n\n    body {\n      background:\n        radial-gradient(circle at 85% -10%, rgba(232,112,10,0.18) 0%, transparent 55%),\n        radial-gradient(circle at -10% 100%, rgba(212,40,122,0.14) 0%, transparent 50%),\n        var(--bg);\n      background-attachment: fixed;\n      color: var(--text);\n      font-family: 'DM Mono', monospace;\n      min-height: 100dvh;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      padding: 36px 16px 80px;\n    }\n\n    /* ─── Header ─────────────────────────────────────── */\n    header {\n      width: 100%;\n      max-width: 480px;\n      margin-bottom: 24px;\n      display: flex;\n      align-items: flex-end;\n      justify-content: space-between;\n      gap: 14px;\n    }\n\n    .tool-name {\n      font-family: 'Bebas Neue', sans-serif;\n      font-size: 56px;\n      letter-spacing: 0.03em;\n      color: var(--text);\n      line-height: 0.9;\n    }\n    .tool-name span.bean { color: var(--accent); }\n\n    .tool-sub {\n      font-size: 10px;\n      color: var(--text-dim);\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      margin-top: 8px;\n    }\n\n    .brand-chip {\n      font-family: 'Bebas Neue', sans-serif;\n      font-size: 11px;\n      letter-spacing: 0.22em;\n      color: var(--pink-hi);\n      border: 1px solid rgba(212,40,122,0.4);\n      background: rgba(212,40,122,0.12);\n      padding: 5px 10px 4px;\n      border-radius: 100px;\n      white-space: nowrap;\n      margin-bottom: 4px;\n    }\n\n    /* ─── Board ──────────────────────────────────────── */\n    #board-wrap {\n      width: 100%;\n      max-width: 480px;\n      background: var(--surface);\n      border: 1px solid var(--border2);\n      padding: 5px;\n      position: relative;\n    }\n    /* corner accent ticks */\n    #board-wrap::before,\n    #board-wrap::after {\n      content: '';\n      position: absolute;\n      width: 14px; height: 14px;\n      border: 1.5px solid var(--accent);\n      pointer-events: none;\n    }\n    #board-wrap::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }\n    #board-wrap::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }\n\n    #board {\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 4px;\n    }\n\n    .cell {\n      position: relative;\n      overflow: hidden;\n      cursor: pointer;\n      aspect-ratio: 737 / 1131;\n      background: var(--surface2);\n      user-select: none;\n      -webkit-tap-highlight-color: transparent;\n    }\n    .cell::after {\n      /* subtle inner glow on hover */\n      content: '';\n      position: absolute; inset: 0;\n      box-shadow: inset 0 0 0 0 var(--accent);\n      transition: box-shadow 0.15s;\n      pointer-events: none;\n    }\n    .cell:hover::after { box-shadow: inset 0 0 0 2px var(--accent); }\n    .cell:active { filter: brightness(0.88); }\n\n    .cell img {\n      display: block;\n      width: 100%;\n      height: 100%;\n      object-fit: cover;\n      pointer-events: none;\n      user-select: none;\n      -webkit-user-drag: none;\n    }\n    .cell img.broken { display: none; }\n    .cell .placeholder {\n      position: absolute;\n      inset: 0;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 6px;\n      background:\n        repeating-linear-gradient(135deg,\n          rgba(253,246,227,0.03) 0 8px,\n          transparent 8px 16px),\n        var(--surface2);\n      color: var(--text-faint);\n      font-family: 'Bebas Neue', sans-serif;\n      letter-spacing: 0.12em;\n      pointer-events: none;\n    }\n    .placeholder .ph-num {\n      font-size: clamp(22px, 7vw, 36px);\n      color: var(--text-dim);\n      line-height: 1;\n    }\n    .placeholder .ph-label {\n      font-size: 8px;\n      letter-spacing: 0.28em;\n      color: var(--text-faint);\n    }\n\n    /* ─── Bean chip ──────────────────────────────────── */\n    .chip {\n      position: absolute;\n      pointer-events: none;\n      top: 50%;\n      left: 50%;\n      line-height: 1;\n      display: block;\n      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));\n      animation: chip-drop 0.26s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.45));\n    }\n\n    @keyframes chip-drop {\n      from {\n        transform: translate(var(--tx), calc(var(--ty) - 14px)) rotate(var(--rot)) scale(0.4);\n        opacity: 0;\n      }\n      to {\n        transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1);\n        opacity: 1;\n      }\n    }\n\n    .chip.removing {\n      animation: chip-lift 0.15s ease-in forwards !important;\n    }\n\n    @keyframes chip-lift {\n      to {\n        transform: translate(var(--tx), calc(var(--ty) - 12px)) rotate(var(--rot)) scale(0.25);\n        opacity: 0;\n      }\n    }\n\n    /* ─── Controls ───────────────────────────────────── */\n    #controls {\n      width: 100%;\n      max-width: 480px;\n      margin-top: 16px;\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n\n    #chip-count { flex: 1; }\n\n    .count-num {\n      font-family: 'Bebas Neue', sans-serif;\n      font-size: 32px;\n      color: var(--accent);\n      line-height: 1;\n      letter-spacing: 0.05em;\n    }\n    .count-num .slash { color: var(--text-faint); margin: 0 2px; }\n    .count-num .total { color: var(--text-dim); }\n\n    .count-label {\n      display: block;\n      font-size: 9px;\n      color: var(--text-dim);\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      margin-top: 4px;\n    }\n\n    .btn {\n      font-family: 'Bebas Neue', sans-serif;\n      letter-spacing: 0.08em;\n      border: none;\n      cursor: pointer;\n      transition: background 0.14s, color 0.14s, transform 0.08s, border-color 0.14s;\n    }\n    .btn:active:not(:disabled) { transform: scale(0.97); }\n\n    .btn-primary {\n      background: var(--accent);\n      color: #0E3F4A;\n      font-size: 20px;\n      padding: 14px 22px;\n    }\n    .btn-primary:hover:not(:disabled) { background: var(--accent-hi); }\n\n    #new-btn:disabled {\n      background: transparent;\n      color: var(--accent);\n      border: 1px solid var(--border2);\n      cursor: default;\n      font-size: 20px;\n      padding: 14px 22px;\n    }\n\n    .btn-ghost {\n      background: transparent;\n      color: var(--text-dim);\n      border: 1px solid var(--border2);\n      font-family: 'DM Mono', monospace;\n      font-size: 10px;\n      text-transform: uppercase;\n      letter-spacing: 0.14em;\n      padding: 14px 16px;\n    }\n    .btn-ghost:hover {\n      color: var(--pink-hi);\n      border-color: rgba(212,40,122,0.5);\n      background: rgba(212,40,122,0.08);\n    }\n\n    /* New Board + pips */\n    #new-wrap {\n      display: flex;\n      flex-direction: column;\n      align-items: stretch;\n      gap: 6px;\n    }\n\n    #shuffle-pips {\n      display: flex;\n      justify-content: center;\n      gap: 5px;\n    }\n\n    .pip {\n      width: 6px;\n      height: 6px;\n      border-radius: 50%;\n      background: var(--accent);\n      transition: background 0.4s;\n    }\n    .pip.used { background: var(--border2); }\n\n    /* ─── Loading overlay ────────────────────────────── */\n    #loading {\n      position: fixed;\n      inset: 0;\n      background: var(--bg);\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 14px;\n      z-index: 100;\n      transition: opacity 0.3s;\n    }\n    #loading.hidden { opacity: 0; pointer-events: none; }\n\n    .load-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.22em; text-transform: uppercase; }\n    .load-track { width: 110px; height: 2px; background: var(--border); }\n    .load-fill  { height: 100%; background: var(--accent); width: 0%; transition: width 0.18s; }\n\n    /* footer mark */\n    .footer-mark {\n      width: 100%;\n      max-width: 480px;\n      margin-top: 22px;\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      font-size: 9px;\n      letter-spacing: 0.24em;\n      text-transform: uppercase;\n      color: var(--text-faint);\n    }\n    .footer-mark::before, .footer-mark::after {\n      content: '';\n      flex: 1;\n      height: 1px;\n      background: var(--border);\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <div id=\"loading\">\n    <div class=\"load-label\">Loading cards…<\u002Fdiv>\n    <div class=\"load-track\"><div class=\"load-fill\" id=\"load-fill\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <header>\n    <div>\n      <div class=\"tool-name\">VIRTUAL<span class=\"bean\">BEAN<\u002Fspan><\u002Fdiv>\n      <div class=\"tool-sub\">Lotería Comedy · Play Board<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brand-chip\">v1<\u002Fdiv>\n  <\u002Fheader>\n\n  <div id=\"board-wrap\">\n    <div id=\"board\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"controls\">\n    <div id=\"chip-count\">\n      <div class=\"count-num\"><span id=\"count-num\">0<\u002Fspan><span class=\"slash\"> / <\u002Fspan><span class=\"total\">16<\u002Fspan><\u002Fdiv>\n      <span class=\"count-label\">beans marked<\u002Fspan>\n    <\u002Fdiv>\n    <button class=\"btn btn-ghost\" onclick=\"clearChips()\">Clear<\u002Fbutton>\n    <div id=\"new-wrap\">\n      <button class=\"btn btn-primary\" id=\"new-btn\" onclick=\"newBoard()\">New Board<\u002Fbutton>\n      <div id=\"shuffle-pips\">\n        <span class=\"pip\" id=\"pip-0\"><\u002Fspan>\n        <span class=\"pip\" id=\"pip-1\"><\u002Fspan>\n        <span class=\"pip\" id=\"pip-2\"><\u002Fspan>\n        <span class=\"pip\" id=\"pip-3\"><\u002Fspan>\n        <span class=\"pip\" id=\"pip-4\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"footer-mark\">Lotería Comedy · MTC Tool Suite<\u002Fdiv>\n\n  <script>\n    const TOTAL        = 54;\n    const GRID         = 4;\n    const MAX_SHUFFLES = 5;\n    const COOLDOWN_MS  = 5 * 60 * 1000;\n\n    let boardIndices = [];\n    let markedCells  = new Set();\n\n    /* ── Shuffle state (localStorage-backed) ── */\n    let shufflesLeft  = clamp(parseInt(localStorage.getItem('loteria_shuffles')) || MAX_SHUFFLES, 0, MAX_SHUFFLES);\n    let resetAt       = parseInt(localStorage.getItem('loteria_reset')) || 0;\n    let tickTimer     = null;\n\n    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }\n\n    function saveShuffles() {\n      localStorage.setItem('loteria_shuffles', shufflesLeft);\n      localStorage.setItem('loteria_reset',    resetAt);\n    }\n\n    function recheckReset() {\n      if (shufflesLeft === 0 && resetAt && Date.now() >= resetAt) {\n        shufflesLeft = MAX_SHUFFLES;\n        resetAt = 0;\n        saveShuffles();\n      }\n    }\n\n    function renderShuffleUI() {\n      recheckReset();\n      const btn = document.getElementById('new-btn');\n\n      for (let i = 0; i < MAX_SHUFFLES; i++) {\n        document.getElementById(`pip-${i}`).classList.toggle('used', i >= shufflesLeft);\n      }\n\n      if (shufflesLeft === 0) {\n        btn.disabled = true;\n        startTick();\n      } else {\n        btn.disabled = false;\n        btn.textContent = 'New Board';\n        stopTick();\n      }\n    }\n\n    function startTick() {\n      stopTick();\n      tickFn();\n      tickTimer = setInterval(tickFn, 1000);\n    }\n\n    function stopTick() {\n      if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }\n    }\n\n    function tickFn() {\n      if (Date.now() >= resetAt) {\n        recheckReset();\n        renderShuffleUI();\n      } else {\n        const ms   = Math.max(0, resetAt - Date.now());\n        const mins = Math.floor(ms / 60000);\n        const secs = Math.floor((ms % 60000) / 1000);\n        document.getElementById('new-btn').textContent = `${mins}:${String(secs).padStart(2, '0')}`;\n      }\n    }\n\n    /* ── Board ── */\n    function shuffle(arr) {\n      for (let i = arr.length - 1; i > 0; i--) {\n        const j = Math.floor(Math.random() * (i + 1));\n        [arr[i], arr[j]] = [arr[j], arr[i]];\n      }\n    }\n\n    function pickBoard() {\n      const pool = Array.from({ length: TOTAL }, (_, i) => i + 1);\n      shuffle(pool);\n      return pool.slice(0, GRID * GRID);\n    }\n\n    function renderBoard() {\n      const el = document.getElementById('board');\n      el.innerHTML = '';\n      markedCells.clear();\n      updateCount();\n\n      boardIndices.forEach((imgNum, cellIdx) => {\n        const cell = document.createElement('div');\n        cell.className = 'cell';\n\n        const img = document.createElement('img');\n        img.src = `png/img${imgNum}.png`;\n        img.alt = '';\n        img.addEventListener('error', () => {\n          img.classList.add('broken');\n          const ph = document.createElement('div');\n          ph.className = 'placeholder';\n          ph.innerHTML = `<div class=\"ph-num\">${String(imgNum).padStart(2,'0')}<\u002Fdiv><div class=\"ph-label\">Carta<\u002Fdiv>`;\n          cell.insertBefore(ph, img);\n        }, { once: true });\n        cell.appendChild(img);\n\n        cell.addEventListener('click', () => toggleMark(cell, cellIdx));\n        el.appendChild(cell);\n      });\n    }\n\n    /* ── Marking ── */\n    function toggleMark(cell, idx) {\n      markedCells.has(idx) ? removeChip(cell, idx) : addChip(cell, idx);\n      updateCount();\n    }\n\n    function addChip(cell, idx) {\n      markedCells.add(idx);\n\n      const rect = cell.getBoundingClientRect();\n      const dx   = (Math.random() * 0.28 - 0.14) * rect.width;\n      const dy   = (Math.random() * 0.28 - 0.14) * rect.height;\n      const rot  = (Math.random() * 28 - 14).toFixed(1);\n      const size = Math.round(rect.width * 0.54);\n\n      const chip = document.createElement('span');\n      chip.className   = 'chip';\n      chip.textContent = '🫘';\n      chip.style.fontSize = `${size}px`;\n      chip.style.setProperty('--tx', `calc(-50% + ${dx.toFixed(1)}px)`);\n      chip.style.setProperty('--ty', `calc(-50% + ${dy.toFixed(1)}px)`);\n      chip.style.setProperty('--rot', `${rot}deg`);\n      cell.appendChild(chip);\n    }\n\n    function removeChip(cell, idx) {\n      markedCells.delete(idx);\n      const chip = cell.querySelector('.chip');\n      if (!chip || chip.classList.contains('removing')) return;\n      chip.classList.add('removing');\n      chip.addEventListener('animationend', () => chip.remove(), { once: true });\n    }\n\n    function updateCount() {\n      document.getElementById('count-num').textContent = markedCells.size;\n    }\n\n    /* ── Controls ── */\n    function clearChips() {\n      document.querySelectorAll('.chip:not(.removing)').forEach(chip => {\n        chip.classList.add('removing');\n        chip.addEventListener('animationend', () => chip.remove(), { once: true });\n      });\n      markedCells.clear();\n      updateCount();\n    }\n\n    function newBoard() {\n      recheckReset();\n      if (shufflesLeft <= 0) return;\n      if (markedCells.size > 0 && !confirm('Start a new board? Your chips will be cleared.')) return;\n\n      shufflesLeft--;\n      if (shufflesLeft === 0) resetAt = Date.now() + COOLDOWN_MS;\n      saveShuffles();\n      renderShuffleUI();\n\n      boardIndices = pickBoard();\n      renderBoard();\n    }\n\n    /* ── Init ── */\n    (function init() {\n      boardIndices = pickBoard();\n      renderBoard();\n      renderShuffleUI();\n\n      const imgs    = document.querySelectorAll('.cell img');\n      const fill    = document.getElementById('load-fill');\n      const loading = document.getElementById('loading');\n      let loaded = 0;\n\n      function onSettle() {\n        loaded++;\n        fill.style.width = (loaded / imgs.length * 100) + '%';\n        if (loaded === imgs.length) {\n          loading.classList.add('hidden');\n          setTimeout(() => loading.remove(), 350);\n        }\n      }\n\n      if (imgs.length === 0) { loading.classList.add('hidden'); return; }\n      imgs.forEach(img => {\n        if (img.complete) onSettle();\n        else {\n          img.addEventListener('load',  onSettle, { once: true });\n          img.addEventListener('error', onSettle, { once: true });\n        }\n      });\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
